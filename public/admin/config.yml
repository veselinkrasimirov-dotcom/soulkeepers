backend:
  name: github
  repo: veselinkrasimirov-dotcom/soulkeepers
  branch: main
  base_url: https://watchhaikus.com
  auth_endpoint: /api/auth

media_folder: public/images
public_folder: /images

collections:
  - name: settings
    label: Site Settings
    files:
      - name: contact
        label: Contact & Social
        file: src/data/site.json
        fields:
          - { label: Site Bio, name: bio, widget: string, hint: "Short line shown in every footer." }
          - { label: Instagram handle (without @), name: instagram, widget: string, required: false }
          - { label: X / Twitter handle (without @), name: x, widget: string, required: false }
          - { label: Contact email, name: email, widget: string, required: false }

  - name: essays
    label: Essays
    folder: src/content/essays
    create: true
    slug: "{{slug}}"
    fields:
      - { label: Title, name: title, widget: string }
      - { label: Subtitle, name: subtitle, widget: string, required: false }
      - { label: Series, name: series, widget: string }
      - { label: Series Number, name: seriesNumber, widget: number }
      - { label: Date, name: date, widget: datetime, format: YYYY-MM-DD, date_format: DD MMM YYYY, time_format: false }
      - { label: Reading Time, name: readingTime, widget: string, required: false, hint: "e.g. 9 min" }
      - { label: Featured on homepage, name: featured, widget: boolean, default: false }
      - { label: Cover Image, name: image, widget: image, required: false }
      - { label: Image Alt Text, name: imageAlt, widget: string, required: false }
      - { label: Body, name: body, widget: markdown }

  - name: haikus
    label: Haikus
    folder: src/content/haikus
    create: true
    slug: "{{number}}-{{brand}}"
    fields:
      - { label: "Number", name: number, widget: number, hint: "Sequential haiku number." }
      - { label: Title, name: title, widget: string, required: false, hint: "Leave blank for verse-only haikus." }
      - { label: Watch, name: watch, widget: string, required: false }
      - { label: Brand, name: brand, widget: string }
      - { label: Date, name: date, widget: datetime, format: YYYY-MM-DD, date_format: DD MMM YYYY, time_format: false }
      - { label: Cover Image, name: image, widget: image, required: false }
      - { label: Image Alt Text, name: imageAlt, widget: string, required: false }
      - { label: Body, name: body, widget: markdown }

  - name: watches
    label: Available Watches
    folder: src/content/watches
    create: true
    slug: "{{slug}}"
    fields:
      - { label: Brand, name: brand, widget: string }
      - { label: Model, name: model, widget: string }
      - { label: Reference, name: reference, widget: string }
      - { label: Spec Line, name: spec, widget: string }
      - label: Status
        name: status
        widget: select
        options: [available, sold]
        default: available
      - { label: Cover Image, name: image, widget: image, required: false }
      - { label: Image Alt Text, name: imageAlt, widget: string, required: false }
      - { label: Related Essay (slug), name: relatedEssay, widget: string, required: false }
      - { label: Description, name: body, widget: markdown }
